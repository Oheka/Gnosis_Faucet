<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gnosis Chain Faucet</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Load Ethers.js (browser-compatible version) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" defer></script>
    <!-- Load custom JavaScript -->
    <script src="scripts.js" defer></script>
</head>
<body>
    <div class="main-container">
        <!-- Header Section -->
        <header>
            <h1>Gnosis Faucet</h1>
            <p>Claim free xDAI directly to your wallet.</p>
        </header>

        <!-- Faucet Section -->
        <section id="faucet-section">
            <button id="connect-wallet" class="wallet-button">Connect Wallet</button>
            <form id="faucet-form">
                <label for="wallet-address">Wallet Address</label>
                <input type="text" id="wallet-address" placeholder="Your wallet address" readonly>
                <button type="button" id="claim-button" class="claim-button">Claim xDAI</button>
            </form>
            <p id="response-message"></p>
        </section>

        <!-- Footer -->
        <footer>
            <p>&copy; 2024 Gnosis Faucet</p>
        </footer>
    </div>
</body>
</html>
