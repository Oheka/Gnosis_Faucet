<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gnosis Chain Faucet</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="main-container">
        <header>
            <h1>Gnosis Faucet <i class="fas fa-tint"></i></h1>
            <p>Claim free xDAI directly to your wallet.</p>
        </header>

        <section id="faucet-section">
            <button class="wallet-button" id="connect-wallet">
                <i class="fas fa-wallet"></i> Connect Wallet
            </button>

            <form id="faucet-form">
                <label for="wallet-address">Wallet Address</label>
                <input type="text" id="wallet-address" placeholder="Enter your wallet address" required readonly>

                <button type="button" id="claim-button" class="claim-button">
                    <i class="fas fa-hand-holding-water"></i> Claim xDAI
                </button>
            </form>

            <p id="response-message"></p>
        </section>

        <footer>
            <p>&copy; 2024 Gnosis Faucet</p>
        </footer>
    </div>

    <!-- Link to the JavaScript file -->
    <script src="scripts.js"></script>
</body>
</html>
