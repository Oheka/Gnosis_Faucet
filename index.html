<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gnosis Faucet</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/web3/dist/web3.min.js"></script>
    <script src="scripts.js" defer></script>
</head>
<body>
    <main class="container">
        <header class="header">
            <h1>Gnosis Faucet</h1>
            <p>Claim free xDAI tokens directly to your wallet.</p>
        </header>

        <section class="faucet-section">
            <button id="connect-wallet" class="btn">Connect Wallet</button>

            <div class="wallet-info">
                <label for="wallet-address">Wallet Address</label>
                <input type="text" id="wallet-address" placeholder="Connect your wallet" readonly>
            </div>

            <button id="claim-button" class="btn btn-primary" disabled>Claim xDAI</button>
            <p id="response-message" class="response-message"></p>
        </section>

        <footer class="footer">
            <p>&copy; 2024 Gnosis Faucet | Built with ❤️ by Oheka</p>
        </footer>
    </main>
</body>
</html>
